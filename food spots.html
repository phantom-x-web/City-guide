<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Spots - Vizianagaram</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --gold:    #c9973a;
    --gold-lt: #e8c47a;
    --deep:    #1a1208;
    --brown:   #3d2b0e;
    --cream:   #fdf6ec;
    --muted:   #7a6a55;
    --card-bg: #fffdf8;
    --border:  #e8d9c0;
    --btn:     #c9973a;
    --btn-hov: #a6782a;
    --footer:  #1a1208;
  }

  html { scroll-behavior: smooth; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--cream);
    color: var(--deep);
  }

  /* ── MARQUEE ── */
  .marquee-bar {
    background: var(--brown);
    color: var(--gold-lt);
    padding: 10px;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 1px;
    overflow: hidden;
    white-space: nowrap;
  }
  .marquee-bar span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 14s linear infinite;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }

  /* ── HERO HEADER ── */
  .page-hero {
    background: linear-gradient(135deg, #1a1208 0%, #3d2b0e 100%);
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 200px;
  }
  .page-hero-inner {
    width: 100%;
    max-width: 860px;
    border-radius: 16px;
    border: 1px solid rgba(201,151,58,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    padding: 40px 32px;
    text-align: center;
    background: rgba(26,18,8,0.6);
    position: relative;
  }
  .page-hero-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid rgba(201,151,58,0.15);
    pointer-events: none;
  }
  .page-hero-inner h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(26px, 5vw, 48px);
    color: #fff;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  .page-hero-inner h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 14px auto 0;
    border-radius: 2px;
  }
  .page-hero-inner p {
    color: var(--gold-lt);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 12px;
    opacity: 0.85;
  }



  /* ── CATEGORY BUTTONS ── */
  .cat-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 32px 24px 16px;
    max-width: 960px;
    margin: 0 auto;
  }
  .cat-btn {
    background: var(--card-bg);
    color: var(--brown);
    border: 1px solid var(--border);
    padding: 11px 26px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: background 0.25s, transform 0.2s, box-shadow 0.2s, color 0.2s;
  }
  .cat-btn:hover, .cat-btn.active {
    background: var(--btn);
    color: #fff;
    border-color: var(--btn);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(201,151,58,0.35);
  }

  /* ── SECTION HEADING ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    color: var(--brown);
    text-align: center;
    margin: 32px 0 6px;
    letter-spacing: 1px;
  }
  .section-title::after {
    content: '';
    display: block;
    width: 50px;
    height: 3px;
    background: var(--gold);
    margin: 10px auto 0;
    border-radius: 2px;
  }

  /* ── FOOD GRID ── */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    padding: 24px 24px 48px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── FOOD CARD ── */
  .food-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(61,43,14,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .food-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 16px 40px rgba(61,43,14,0.15);
  }
  .food-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 14px;
    transition: transform 0.4s ease;
  }
  .food-card img:hover { transform: scale(1.05); }

  .food-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 6px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .food-card h2::after {
    content: '';
    display: block;
    width: 28px;
    height: 2px;
    background: var(--gold);
    margin-top: 6px;
    border-radius: 2px;
  }
  .food-card p {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
    margin-top: 6px;
  }

  /* ── EMPTY STATE ── */
  #info-area:empty::after {
    content: 'Select a category above to explore food spots';
    display: block;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    padding: 48px 24px;
    font-weight: 300;
  }

  /* ── ORDER ONLINE STRIP ── */
  .order-strip {
    background: var(--brown);
    text-align: center;
    padding: 18px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .order-strip span {
    color: var(--gold-lt);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .order-link {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    text-decoration: none;
    padding: 8px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Outfit', sans-serif;
    transition: background 0.2s, transform 0.2s;
  }
  .order-link:hover {
    background: var(--btn-hov);
    transform: translateY(-2px);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    background: var(--footer);
    color: rgba(255,255,255,0.55);
    padding: 20px;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  footer strong { color: var(--gold); font-weight: 600; }

  /* ── BACK TO TOP ── */
  .top-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--brown);
    color: var(--gold-lt);
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }
  .top-btn:hover {
    background: var(--gold);
    color: #fff;
    transform: translateY(-3px);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
</style>
</head>

<body>

<!-- MARQUEE -->
<div class="marquee-bar">
  <span>Breakfast &nbsp;•&nbsp; Lunch &nbsp;•&nbsp; Snacks &nbsp;•&nbsp; Sweets &nbsp;•&nbsp; Desserts &amp; Milkshakes &nbsp;•&nbsp; Best Food Spots in Vizianagaram</span>
</div>

<!-- HERO -->
<section class="page-hero">
  <div class="page-hero-inner">
    <h1>Food Spots</h1>
    <p>Breakfast &nbsp;•&nbsp; Lunch &nbsp;•&nbsp; Snacks &nbsp;•&nbsp; Sweets &nbsp;•&nbsp; Desserts</p>
  </div>
</section>


<!-- CATEGORY BUTTONS -->
<nav class="cat-nav">
  <button class="cat-btn" onclick="showBreakfast(this)">🍳 Breakfast</button>
  <button class="cat-btn" onclick="showLunch(this)">🍚 Lunch</button>
  <button class="cat-btn" onclick="showSnacks(this)">🍟 Snacks</button>
  <button class="cat-btn" onclick="showSweets(this)">🍡 Sweets</button>
  <button class="cat-btn" onclick="showDesserts(this)">🍦 Desserts / Milkshakes</button>
</nav>

<!-- DYNAMIC CONTENT -->
<div id="info-area"></div>

<!-- ORDER ONLINE STRIP -->
<div class="order-strip">
  <span>Order food online:</span>
  <a class="order-link" href="https://www.zomato.com/" target="_blank">Zomato</a>
  <a class="order-link" href="https://www.swiggy.com/" target="_blank">Swiggy</a>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Vizianagaram Tourism Guide | Created by <strong>PHANTOM</strong>
</footer>

<button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="top-btn">⬆</button>

<script>
const area = document.getElementById("info-area");

function setActive(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function render(title, cards) {
  area.innerHTML =
    "<h2 class='section-title'>" + title + "</h2>" +
    "<div class='food-grid'>" + cards + "</div>";
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function card(img, name, detail) {
  return "<div class='food-card'>" +
    "<img src='" + img + "' alt='" + name + "' onerror=\"this.style.display='none'\">" +
    "<h2>" + name + "</h2>" +
    "<p>" + detail + "</p>" +
    "</div>";
}

function showBreakfast(btn) {
  setActive(btn);
  render("Breakfast Places",
    card("images/breakfast1.jpg", "Paradise Tiffins and Restaurant", "RTC Complex, Lower Tankbund Road") +
    card("images/breakfast2.jpg", "Mayuri Tiffins", "PSR Complex, Lower Tankbund Road") +
    card("images/breakfast3.jpg", "Swapna Tiffins And Meals", "Ice Factory Area, Krishnarajapuram") +
    card("images/breakfast4.jpg", "SVN Lake Palace", "Lower Tankbund Rd, Balaji Nagar")
  );
}

function showLunch(btn) {
  setActive(btn);
  render("Lunch & Dinner Places",
    card("images/lunch1.jpg", "Biryani's and More", "100 Ft Ring Road") +
    card("images/lunch2.jpg", "Mandi Croods", "Raja Bazar") +
    card("images/lunch3.jpg", "HIGHTIDE", "RTC Complex Area") +
    card("images/lunch4.jpg", "Star Biryani Point", "Cantonment")
  );
}

function showSnacks(btn) {
  setActive(btn);
  render("Snacks",
    card("images/snack1.jpg", "Punugulu", "Near NCS Theatre") +
    card("images/snack2.jpg", "Samosa & Bread Pakoda", "Three Lamp Junction") +
    card("images/snack3.jpg", "Bread Bajji & Pakodi", "Vulli Veedhi") +
    card("images/snack4.jpg", "KFC & Domino's", "RTC Complex Area") +
    card("images/panipuri.jpg", "Pani Puri", "Beside CMR Shopping Mall")
  );
}

function showSweets(btn) {
  setActive(btn);
  render("Indian Sweets",
    card("images/sweet1.jpg", "Sharma Sweets", "SKP Temple Area") +
    card("images/sweet2.jpg", "Devi Sweets", "SKP Temple Area")
  );
}

function showDesserts(btn) {
  setActive(btn);
  render("Desserts & Milkshakes",
    card("images/dessert1.jpg", "Ibaco", "100 Feet Ring Road, Dharmapuri — Best for: Premium Ice Creams") +
    card("images/dessert2.jpg", "Belgian Waffle", "Opposite Bhasyam School, Ring Road — Best for: Waffles") +
    card("images/dessert3.jpg", "Organic Iceberg", "100 Ft Ring Rd, Dharmapuri — Best for: Natural Ice Creams") +
    card("images/dessert4.jpg", "Brew House", "100 Feet Ring Road — Best for: Desserts") +
    card("images/dessert5.jpg", "Andhra Aromas", "Lower Tank Bund Road — Best for: Milkshakes") +
    card("images/dessert6.jpg", "The Legendairy Milkshakes", "Srirama Colony, Balaji Nagar — Best for: Milkshakes")
  );
}
</script>

</body>
</html>
