<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion - Vizianagaram</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:    #c9973a;
      --gold-lt: #e8c47a;
      --deep:    #1a1208;
      --brown:   #3d2b0e;
      --cream:   #fdf6ec;
      --muted:   #7a6a55;
      --card-bg: #fffdf8;
      --border:  #e8d9c0;
      --btn:     #c9973a;
      --btn-hov: #a6782a;
      --footer:  #1a1208;
    }

    html { scroll-behavior: smooth; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--cream);
      color: var(--deep);
    }

    /* ── MARQUEE ── */
    .marquee-bar {
      background: var(--brown);
      color: var(--gold-lt);
      padding: 10px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 1px;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-bar span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 14s linear infinite;
    }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }

    /* ── HERO ── */
    .page-hero {
      background: linear-gradient(135deg, #1a1208 0%, #3d2b0e 100%);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    .page-hero-inner {
      width: 100%;
      max-width: 860px;
      border-radius: 16px;
      border: 1px solid rgba(201,151,58,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      padding: 40px 32px;
      text-align: center;
      background: rgba(26,18,8,0.6);
      position: relative;
    }
    .page-hero-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 1px solid rgba(201,151,58,0.15);
      pointer-events: none;
    }
    .page-hero-inner h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(26px, 5vw, 48px);
      color: #fff;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }
    .page-hero-inner h1::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 14px auto 0;
      border-radius: 2px;
    }
    .page-hero-inner p {
      color: var(--gold-lt);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 12px;
      opacity: 0.85;
    }

   
    /* ── GENDER BUTTONS ── */
    .gender-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      padding: 32px 24px 8px;
    }
    .gender-btn {
      background: var(--card-bg);
      color: var(--brown);
      border: 1px solid var(--border);
      padding: 13px 36px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: background 0.25s, transform 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .gender-btn:hover, .gender-btn.active {
      background: var(--btn);
      color: #fff;
      border-color: var(--btn);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(201,151,58,0.35);
    }

    /* ── SUBCATEGORY BUTTONS ── */
    .sub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 20px 24px 8px;
    }
    .sub-btn {
      background: var(--cream);
      color: var(--brown);
      border: 1px solid var(--border);
      padding: 9px 22px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .sub-btn:hover, .sub-btn.active {
      background: var(--brown);
      color: var(--gold-lt);
      border-color: var(--brown);
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(61,43,14,0.2);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 700;
      color: var(--brown);
      text-align: center;
      margin: 28px 0 6px;
      letter-spacing: 1px;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 44px;
      height: 2px;
      background: var(--gold);
      margin: 10px auto 0;
      border-radius: 2px;
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      padding: 20px 24px 48px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── STORE CARD ── */
    .store-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(61,43,14,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .store-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(61,43,14,0.15);
    }
    .store-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .store-card h3::after {
      content: '';
      display: block;
      width: 28px;
      height: 2px;
      background: var(--gold);
      margin-top: 8px;
      border-radius: 2px;
    }
    .store-card h3 a {
      color: var(--brown);
      text-decoration: none;
      transition: color 0.2s;
    }
    .store-card h3 a:hover { color: var(--gold); }

    .store-card p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 300;
      margin-top: 6px;
    }
    .store-card p b {
      color: var(--brown);
      font-weight: 500;
    }

    /* ── PRICE BADGE ── */
    .price-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 500;
      margin-top: 8px;
    }
    .price-budget   { background: #eaf3de; color: #3b6d11; }
    .price-moderate { background: #faeeda; color: #854f0b; }
    .price-high     { background: #fcebeb; color: #a32d2d; }

    /* ── RATING STARS ── */
    .rating {
      font-size: 13px;
      color: var(--gold);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 56px 24px;
      font-weight: 300;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      background: var(--footer);
      color: rgba(255,255,255,0.55);
      padding: 20px;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    footer strong { color: var(--gold); font-weight: 600; }

    /* ── BACK TO TOP ── */
    .top-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--brown);
      color: var(--gold-lt);
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .top-btn:hover {
      background: var(--gold);
      color: #fff;
      transform: translateY(-3px);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
  </style>
</head>

<body>

<!-- MARQUEE -->
<div class="marquee-bar">
  <span>Men's Fashion &nbsp;•&nbsp; Women's Fashion &nbsp;•&nbsp; Shirts &nbsp;•&nbsp; Watches &nbsp;•&nbsp; Shoes &nbsp;•&nbsp; Jewellery &nbsp;•&nbsp; Best Fashion Stores in Vizianagaram</span>
</div>

<!-- HERO -->
<section class="page-hero">
  <div class="page-hero-inner">
    <h1>Fashion</h1>
    <p>Men &nbsp;•&nbsp; Women &nbsp;•&nbsp; Clothing &nbsp;•&nbsp; Jewellery &nbsp;•&nbsp; Footwear</p>
  </div>
</section>


<!-- GENDER BUTTONS -->
<div class="gender-nav">
  <button class="gender-btn" onclick="showMen(this)">👔 Men</button>
  <button class="gender-btn" onclick="showWomen(this)">👗 Women</button>
</div>

<!-- SUBCATEGORY + CARDS -->
<div id="sub-nav-area"></div>
<div id="content-area"><p class="empty-state">Select Men or Women above to explore fashion stores</p></div>

<!-- FOOTER -->
<footer>
  © 2026 Vizianagaram Tourism Guide | Created by <strong>PHANTOM</strong>
</footer>

<button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="top-btn">⬆</button>

<script>
  let currentGender = '';

  function setActiveGender(btn) {
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  function setActiveSub(btn) {
    document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function priceBadge(label) {
    const low = label.toLowerCase();
    let cls = 'price-moderate';
    if (low.includes('budget') && !low.includes('moderate')) cls = 'price-budget';
    else if (low === 'high') cls = 'price-high';
    return "<span class='price-badge " + cls + "'>" + label + "</span>";
  }

  function stars(r) {
    const full = Math.floor(r);
    let s = '';
    for (let i = 0; i < 5; i++) s += i < full ? '★' : '☆';
    return "<div class='rating'>" + s + " " + r + " / 5</div>";
  }

  function card(name, url, address, price, rating) {
    return "<div class='store-card'>" +
      "<h3><a href='" + url + "' target='_blank'>" + name + "</a></h3>" +
      "<p><b>Address:</b> " + address + "</p>" +
      priceBadge(price) +
      stars(rating) +
      "</div>";
  }

  function renderCards(title, cardsHtml) {
    document.getElementById('content-area').innerHTML =
      "<h2 class='section-title'>" + title + "</h2>" +
      "<div class='card-grid'>" + cardsHtml + "</div>";
  }

  /* ── MEN ── */
  function showMen(btn) {
    setActiveGender(btn);
    currentGender = 'men';
    document.getElementById('sub-nav-area').innerHTML =
      "<div class='sub-nav'>" +
      "<button class='sub-btn' onclick='showMenShirts(this)'>👕 Shirts &amp; Pants</button>" +
      "<button class='sub-btn' onclick='showMenWatches(this)'>⌚ Watches</button>" +
      "<button class='sub-btn' onclick='showMenShoes(this)'>👞 Shoes</button>" +
      "</div>";
    document.getElementById('content-area').innerHTML =
      "<p class='empty-state'>Choose a category above</p>";
  }

  function showMenShirts(btn) {
    setActiveSub(btn);
    renderCards("Men — Shirts &amp; Pants",
      card("South India Shopping Mall", "https://www.southindiaeshop.com/", "Poolbagh Road, Vizianagaram", "High", 4.5) +
      card("Rukmini Shopping Mall", "https://www.rukminisilksarees.com/", "RTC Complex Road", "Budget", 3.7) +
      card("Chennai Silks", "https://www.thescmsilk.in/", "Poolbagh Road", "Moderate", 4.0) +
      card("CMR Shopping Mall", "https://www.cmrjewellery.com/", "Station Road", "High", 4.5)
    );
  }

  function showMenWatches(btn) {
    setActiveSub(btn);
    renderCards("Men — Watches",
      card("Titan World", "https://www.titan.co.in/", "RTC Complex Area", "Moderate", 4.4) +
      card("Fastrack Store", "https://www.fastrack.in/", "NCS Mall Area", "Moderate", 4.2)
    );
  }

  function showMenShoes(btn) {
    setActiveSub(btn);
    renderCards("Men — Shoes",
      card("Janapriya Footwear", "https://www.indiamart.com/", "Main Road", "Budget", 3.9) +
      card("Popular Footwear", "https://www.popularshoemart.com/", "RTC Complex Area", "Budget", 4.0)
    );
  }

  /* ── WOMEN ── */
  function showWomen(btn) {
    setActiveGender(btn);
    currentGender = 'women';
    document.getElementById('sub-nav-area').innerHTML =
      "<div class='sub-nav'>" +
      "<button class='sub-btn' onclick='showWomenDresses(this)'>👗 Dresses</button>" +
      "<button class='sub-btn' onclick='showWomenJewellery(this)'>💍 Jewellery</button>" +
      "<button class='sub-btn' onclick='showWomenFootwear(this)'>👠 Footwear</button>" +
      "</div>";
    document.getElementById('content-area').innerHTML =
      "<p class='empty-state'>Choose a category above</p>";
  }

  function showWomenDresses(btn) {
    setActiveSub(btn);
    renderCards("Women — Dresses",
      card("Razvi Fashion", "https://www.razvistore.in/", "Main Road", "Budget", 4.1) +
      card("MR Shopping Mall", "https://www.justdial.com/", "RTC Complex Road", "Budget", 3.8) +
      card("SR Shopping Mall", "https://srshoppingmall.com/", "Fort Road", "Moderate", 3.9) +
      card("Chandana Brothers", "https://chandanabrothers.com/", "Poolbagh Road", "Moderate", 4.5)
    );
  }

  function showWomenJewellery(btn) {
    setActiveSub(btn);
    renderCards("Women — Jewellery",
      card("Govinda Jewellery", "https://govindjis.com/", "Main Road", "High", 4.4) +
      card("Dhanalakshmi Jewellery", "https://www.dhanalakshmijewellery.in/", "RTC Complex Area", "Moderate", 4.0)
    );
  }

  function showWomenFootwear(btn) {
    setActiveSub(btn);
    renderCards("Women — Footwear",
      card("Bata", "https://www.bata.com/in/", "RTC Complex Road", "Budget", 4.2) +
      card("Walkmate", "https://walkmate.co.in/", "Main Road", "Budget", 3.9)
    );
  }
</script>

</body>
</html>
